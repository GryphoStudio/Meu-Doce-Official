name: myapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase (versões estáveis e compatíveis entre si)
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  firebase_database: ^12.0.4

  # UI e utilitários
  google_fonts: ^6.2.1
  provider: ^6.1.4
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  share_plus: ^12.0.1
  image_picker: ^1.1.2
  google_sign_in: ^7.2.0
  font_awesome_flutter: ^10.12.0
  supabase_flutter: ^2.5.6
  transparent_image: ^2.0.1
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  diacritic: ^0.1.6
  qr_flutter: ^4.1.0
  clipboard: ^2.0.2

  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/doce.jpg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  android: true
  ios: true
  image_path: "assets/doce.jpg"
